<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Premium Cake Order Calculator – Choose your perfect cake, customize toppings and calculate your total instantly." />
  <title>Cake Order Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="initApp()">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <main class="container">
    <section class="hero" id="heroSection">
      <div class="hero-image-wrapper">
        <img src="images/hero.png" alt="Premium Luxury Cake" class="hero-image" id="heroImage" />
        <div class="hero-overlay"></div>
      </div>
      <div class="hero-content"><h1>Cake Order</h1><p class="tagline">Design your dream cake & get instant pricing</p></div>
    </section>

    <section class="card" id="orderCard">
      <h2 class="card-title">🎂 Build Your Cake</h2>
      <form id="cakeOrderForm" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
          <label for="customerName">Your Name</label>
          <input type="text" id="customerName" class="form-input" placeholder="Enter your name" onkeyup="handleNameKeyup(event)" required />
        </div>

        <div class="form-group">
          <label>Choose Your Flavour</label>
          <div class="flavour-grid" id="flavourGrid">
            <label class="flavour-card"><input type="radio" name="cakeFlavour" value="vanilla" data-price="500" class="flavour-radio" onchange="handleFlavourChange()" /><span class="flavour-visual"><img src="images/vanilla.png" alt="Vanilla Cake" class="flavour-img" /><span class="flavour-name">Vanilla</span><span class="flavour-price">₹500</span></span></label>
            <label class="flavour-card"><input type="radio" name="cakeFlavour" value="chocolate" data-price="600" class="flavour-radio" onchange="handleFlavourChange()" /><span class="flavour-visual"><img src="images/chocolate.png" alt="Chocolate Cake" class="flavour-img" /><span class="flavour-name">Chocolate</span><span class="flavour-price">₹600</span></span></label>
            <label class="flavour-card"><input type="radio" name="cakeFlavour" value="strawberry" data-price="650" class="flavour-radio" onchange="handleFlavourChange()" /><span class="flavour-visual"><img src="images/strawberry.png" alt="Strawberry Cake" class="flavour-img" /><span class="flavour-name">Strawberry</span><span class="flavour-price">₹650</span></span></label>
            <label class="flavour-card"><input type="radio" name="cakeFlavour" value="butterscotch" data-price="550" class="flavour-radio" onchange="handleFlavourChange()" /><span class="flavour-visual"><img src="images/butterscotch.png" alt="Butterscotch Cake" class="flavour-img" /><span class="flavour-name">Butterscotch</span><span class="flavour-price">₹550</span></span></label>
            <label class="flavour-card"><input type="radio" name="cakeFlavour" value="redvelvet" data-price="750" class="flavour-radio" onchange="handleFlavourChange()" /><span class="flavour-visual"><img src="images/redvelvet.png" alt="Red Velvet Cake" class="flavour-img" /><span class="flavour-name">Red Velvet</span><span class="flavour-price">₹750</span></span></label>
            <label class="flavour-card"><input type="radio" name="cakeFlavour" value="blackforest" data-price="700" class="flavour-radio" onchange="handleFlavourChange()" /><span class="flavour-visual"><img src="images/blackforest.png" alt="Black Forest Cake" class="flavour-img" /><span class="flavour-name">Black Forest</span><span class="flavour-price">₹700</span></span></label>
            <label class="flavour-card"><input type="radio" name="cakeFlavour" value="pineapple" data-price="500" class="flavour-radio" onchange="handleFlavourChange()" /><span class="flavour-visual"><img src="images/pineapple.png" alt="Pineapple Cake" class="flavour-img" /><span class="flavour-name">Pineapple</span><span class="flavour-price">₹500</span></span></label>
            <label class="flavour-card"><input type="radio" name="cakeFlavour" value="mango" data-price="650" class="flavour-radio" onchange="handleFlavourChange()" /><span class="flavour-visual"><img src="images/mango.png" alt="Mango Cake" class="flavour-img" /><span class="flavour-name">Mango</span><span class="flavour-price">₹650</span></span></label>
          </div>
        </div>

        <div class="selected-preview hidden" id="selectedPreview">
          <img src="" alt="Selected cake" class="selected-img" id="selectedImg" />
          <div class="selected-info"><span class="selected-name" id="selectedName">—</span><span class="selected-price" id="selectedPrice">₹0</span></div>
        </div>

        <div class="form-group">
          <label>Cake Size (Weight)</label>
          <div class="radio-group" id="sizeGroup">
            <label class="radio-card"><input type="radio" name="cakeSize" value="0.5" class="radio-input" onchange="handleSizeChange()" /><span class="radio-label"><span class="radio-text">0.5 Kg</span><span class="radio-price">×0.5</span></span></label>
            <label class="radio-card"><input type="radio" name="cakeSize" value="1" class="radio-input" onchange="handleSizeChange()" checked /><span class="radio-label"><span class="radio-text">1 Kg</span><span class="radio-price">×1</span></span></label>
            <label class="radio-card"><input type="radio" name="cakeSize" value="1.5" class="radio-input" onchange="handleSizeChange()" /><span class="radio-label"><span class="radio-text">1.5 Kg</span><span class="radio-price">×1.5</span></span></label>
            <label class="radio-card"><input type="radio" name="cakeSize" value="2" class="radio-input" onchange="handleSizeChange()" /><span class="radio-label"><span class="radio-text">2 Kg</span><span class="radio-price">×2</span></span></label>
          </div>
        </div>

        <div class="form-group">
          <label>Extra Toppings</label>
          <div class="toppings-banner"><img src="images/toppings.png" alt="Premium cake toppings" class="toppings-img" /></div>
          <div class="checkbox-grid" id="toppingsGroup">
            <label class="checkbox-card"><input type="checkbox" class="topping-checkbox" value="sprinkles" data-price="50" onchange="handleToppingChange()" /><span class="checkbox-label"><span class="checkbox-icon">✨</span><span class="checkbox-text">Sprinkles</span><span class="checkbox-price">+₹50</span></span></label>
            <label class="checkbox-card"><input type="checkbox" class="topping-checkbox" value="fruits" data-price="100" onchange="handleToppingChange()" /><span class="checkbox-label"><span class="checkbox-icon">🍇</span><span class="checkbox-text">Fresh Fruits</span><span class="checkbox-price">+₹100</span></span></label>
            <label class="checkbox-card"><input type="checkbox" class="topping-checkbox" value="nuts" data-price="80" onchange="handleToppingChange()" /><span class="checkbox-label"><span class="checkbox-icon">🥜</span><span class="checkbox-text">Nuts</span><span class="checkbox-price">+₹80</span></span></label>
            <label class="checkbox-card"><input type="checkbox" class="topping-checkbox" value="chocochips" data-price="70" onchange="handleToppingChange()" /><span class="checkbox-label"><span class="checkbox-icon">🍫</span><span class="checkbox-text">Choco Chips</span><span class="checkbox-price">+₹70</span></span></label>
            <label class="checkbox-card"><input type="checkbox" class="topping-checkbox" value="caramel" data-price="90" onchange="handleToppingChange()" /><span class="checkbox-label"><span class="checkbox-icon">🍯</span><span class="checkbox-text">Caramel</span><span class="checkbox-price">+₹90</span></span></label>
            <label class="checkbox-card"><input type="checkbox" class="topping-checkbox" value="fondant" data-price="150" onchange="handleToppingChange()" /><span class="checkbox-label"><span class="checkbox-icon">🎀</span><span class="checkbox-text">Fondant Art</span><span class="checkbox-price">+₹150</span></span></label>
          </div>
        </div>

        <div class="form-group">
          <label for="quantity">Quantity</label>
          <div class="quantity-control">
            <button type="button" class="qty-btn" id="qtyMinus" onclick="changeQuantity(-1)">−</button>
            <input type="number" id="quantity" class="qty-input" value="1" min="1" max="10" onkeyup="handleQtyKeyup()" />
            <button type="button" class="qty-btn" id="qtyPlus" onclick="changeQuantity(1)">+</button>
          </div>
        </div>

        <div class="form-group">
          <label for="cakeMessage">Message on Cake <span class="optional">(optional)</span></label>
          <input type="text" id="cakeMessage" class="form-input" placeholder='e.g. "Happy Birthday!"' maxlength="40" onkeyup="handleMessageKeyup()" />
          <span class="char-count" id="charCount">0/40</span>
        </div>

        <button type="button" id="calculateBtn" class="calculate-btn" onclick="calculateOrder()"><span>🧮 Calculate Total</span></button>
        <button type="submit" id="orderBtn" class="order-btn hidden"><span>🛒 Place Order</span></button>
      </form>

      <div id="orderSummary" class="order-summary hidden">
        <h3 class="summary-title">📋 Order Summary</h3>
        <div class="summary-details" id="summaryDetails"></div>
        <div class="summary-total"><span>Total Amount</span><span class="total-value" id="totalValue">₹0</span></div>
      </div>
    </section>

    <footer class="footer"><p>&copy; 2026 Cake Order Calculator. Made with 🍰 &amp; ❤️</p></footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
