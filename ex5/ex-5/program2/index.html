<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Countdown Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="event-header">
            <h1>🎉 Tech Conference 2026</h1>
            <p class="event-subtitle">Annual Technology Summit</p>
        </div>

        <div class="countdown-section">
            <h2>Event Registration Countdown</h2>
            <div id="countdown-display" class="countdown-display">
                <div class="time-unit">
                    <span id="days" class="time-value">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="separator">:</div>
                <div class="time-unit">
                    <span id="hours" class="time-value">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="separator">:</div>
                <div class="time-unit">
                    <span id="minutes" class="time-value">00</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="separator">:</div>
                <div class="time-unit">
                    <span id="seconds" class="time-value">00</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>
            <div id="status-message" class="status-message"></div>
        </div>

        <div class="registration-form">
            <h2>Event Registration Form</h2>
            <form id="event-form">
                <div class="form-group">
                    <label for="full-name">Full Name *</label>
                    <input type="text" id="full-name" name="full-name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label for="company">Company/Organization</label>
                    <input type="text" id="company" name="company" placeholder="Enter your company name">
                </div>

                <div class="form-group">
                    <label for="role">Your Role *</label>
                    <select id="role" name="role" required>
                        <option value="">Select your role</option>
                        <option value="developer">Software Developer</option>
                        <option value="designer">Designer</option>
                        <option value="manager">Project Manager</option>
                        <option value="student">Student</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="session">Preferred Session *</label>
                    <select id="session" name="session" required>
                        <option value="">Select a session</option>
                        <option value="ai-ml">AI & Machine Learning</option>
                        <option value="web-dev">Web Development</option>
                        <option value="cloud">Cloud Computing</option>
                        <option value="cybersecurity">Cybersecurity</option>
                        <option value="devops">DevOps</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="terms" name="terms" required>
                        <span>I agree to the terms and conditions *</span>
                    </label>
                </div>

                <button type="submit" id="register-btn" class="register-btn">Register Now</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
